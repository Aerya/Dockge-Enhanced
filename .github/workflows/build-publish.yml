name: 🐳 Build & Publish Docker Image

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "README.fr.md"
      - "*.sh"
      - ".github/workflows/sync-upstream.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  # ─── Build natif par plateforme (sans BuildKit, sans Docker Hub) ──────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔡 Image name en minuscules
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 🔑 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Build & Push (tag plateforme)
        run: |
          docker build \
            --platform ${{ matrix.platform }} \
            -t ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.tag }} \
            .
          docker push ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ matrix.tag }}

  # ─── Merge des deux images en un manifest multi-arch ─────────────────
  merge:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 🔡 Image name en minuscules
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 🔑 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Setup Buildx (driver local, sans Docker Hub)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: 🏷️ Metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=
            type=raw,value={{date 'YYYYMMDD'}}

      - name: 🔀 Créer manifest multi-arch et push
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:amd64 \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:arm64
