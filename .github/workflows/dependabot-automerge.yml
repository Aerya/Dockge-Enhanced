name: Dependabot — Auto-merge

on:
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    name: Auto-merge si patch sûr
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Récupérer les métadonnées Dependabot
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Auto-merge GitHub Actions (toujours sûr) ──────────────────────────
      - name: Auto-merge — GitHub Actions (patch + minor)
        if: |
          steps.meta.outputs.package-ecosystem == 'github_actions' &&
          (steps.meta.outputs.update-type == 'version-update:semver-patch' ||
           steps.meta.outputs.update-type == 'version-update:semver-minor')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Auto-merge npm patches — uniquement les packages sans risque runtime ─
      #
      # Sont exclus de l'auto-merge même en patch :
      #   - knex, redbean-node       → couche SQLite / migrations Enhanced
      #   - express, socket.io*      → serveur HTTP et temps réel
      #   - tsx                      → runner du backend entier
      #   - @homebridge/node-pty-*   → module natif compilé
      #   - vue, vue-router          → framework frontend complet
      #   - vite                     → build pipeline (géré par la CI)
      #
      # Tout le reste (types, utils, linting, css) est auto-mergeable en patch.
      - name: Auto-merge — npm patch (packages sûrs uniquement)
        if: |
          steps.meta.outputs.package-ecosystem == 'npm' &&
          steps.meta.outputs.update-type == 'version-update:semver-patch' &&
          !contains(fromJSON('["knex","redbean-node","express","socket.io","socket.io-client","tsx","@homebridge/node-pty-prebuilt-multiarch","vue","vue-router","vite","@louislam/sqlite3"]'), steps.meta.outputs.dependency-names)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
